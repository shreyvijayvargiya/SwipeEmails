<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holiday season family reunion game</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="bg-email-body-color font-sans text-gray-700">

  <!-- Hero Section -->
  <div class="bg-hero-section-color py-8">
    <div class="max-w-md mx-auto text-center">
      <h1 class="text-3xl sm:text-4xl font-bold text-email-text-color leading-tight">IT'S HOLIDAY SEASON</h1>
      <h2 class="text-2xl sm:text-3xl font-bold text-email-text-color leading-tight mt-2">TIME TO BE WITH FAMILY!</h2>
      <p class="mt-4 text-lg text-email-text-color">Alex's family is waiting for him to reach home, but he has lost his way.
        Can you help Alex reunite with his family this holiday season?</p>

      <div class="mt-6 bg-email-button-bg-color py-2 px-4 rounded-md inline-block">
        <p class="text-white text-base">Use arrow keys to move and help Alex find his way home.</p>
        <p class="text-white text-base font-bold">Click on the play button to start the game.</p>
      </div>
    </div>
  </div>

  <!-- Game Image -->
  <div class="py-4">
    <div class="max-w-md mx-auto">
      <img src="image.jpg" alt="Game Image" class="w-full rounded-md"
        style="border-radius: 0px; width: 100%; height: auto;">
    </div>
  </div>
</div>
</body>
</html>
