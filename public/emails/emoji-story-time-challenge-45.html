<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Story Time Challenge!</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="mx-auto max-w-md py-8 px-4 sm:px-6 lg:px-8">

  <div class="flex justify-center py-4">
    <img src="https://i.imgur.com/7e9gWl0.png" alt="Penguin Random House" class="h-12">
  </div>

  <div class="flex justify-center mt-4">
    <img src="https://i.imgur.com/0T4zQj7.png" alt="Emoji Story Time" class="rounded-xl">
  </div>

  <div class="text-center mt-8">
    <p class="text-lg text-gray-800">Happy World Emoji Day! We've translated some of our favorite stories into emojis. Try to guess each bestselling novel, and click to see if you're right.</p>
  </div>

  <div class="mt-8">
    <img src="https://i.imgur.com/7VdO0l8.png" alt="Emoji Puzzles" class="rounded-xl mb-2">
    <img src="https://i.imgur.com/m4Gz9yX.png" alt="Emoji Puzzles" class="rounded-xl mb-2">
    <img src="https://i.imgur.com/yvY2e5d.png" alt="Emoji Puzzles" class="rounded-xl mb-2">
    <img src="https://i.imgur.com/FpYkWkL.png" alt="Emoji Puzzles" class="rounded-xl mb-2">
  </div>

</div>
</body>
</html>
