<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mend a Broken Heart Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="bg-gray-200 text-center py-8 md:py-12 lg:py-16">
  <!-- Email Monks Logo (top) -->
  <div class="mb-8">
    <p class="text-2xl text-yellow-500 font-bold">Email Monks</p>
  </div>

  <!-- Content Area -->
  <div class="px-4">
    <p class="text-xl md:text-2xl lg:text-2xl text-gray-700 mb-6 leading-relaxed">
      This Valentine's day pick up the pieces of broken hearts around you
      and fill them with love. Here is one such heart, see what it has to say
      when you mend this one.
    </p>

    <!-- Heart image section-->
    <div class="relative mb-6">
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" alt="Heart" class="w-full max-w-md mx-auto opacity-0" style="padding-bottom: 82%;"/>
      <div class="absolute inset-0 bg-no-repeat bg-center" style="background-image: url(https://i.imgur.com/uO7O1aE.png)"></div>
    </div>

    <!-- Button -->
    <a href="#" class="bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold py-2 px-4 rounded-md inline-flex items-center hover:opacity-75 transition duration-200">
      <span>MEND THE HEART</span>
      <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    </a>

    <!-- Play Icon and Timer Layout -->
    <div class="mt-6 flex items-center justify-center space-x-4">
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8l7-7 7 7M5 16l7 7 7-7"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 14v6a2 2 0 002 2h12a2 2 0 002-2v-6m-10.121 5.121L12 17l3.121-3.121M3 8v6a2 2 0 002 2h12a2 2 0 002-2v-6"></path>
      </svg>
      <span class="timer-text font-bold text-gray-800 text-xl">00:000</span>

    <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 009.828 3.723M15.921 15.26A8.001 8.001 0 0012 20.277m-5.388-1.01A8.002 8.002 0 017 20.277"></path>
    </svg>
    </div>
  </div>

  <!-- Email Monks Logo (bottom) -->
  <div class="mt-12">
    <p class="text-2xl text-yellow-500 font-bold">Email Monks</p>
  </div>

  <!-- Social Icons -->
  <div class="mt-4 flex justify-center space-x-4">
    <a href="#" class="text-gray-500 hover:text-gray-700">
      <svg fill="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-6 h-6" viewBox="0 0 24 24">
        <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"></path>
      </svg>
    </a>
    <a href="#" class="text-gray-500 hover:text-gray-700">
      <svg fill="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-6 h-6" viewBox="0 0 24 24">
        <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"></path>
      </svg>
    </a>
    <a href="#" class="text-gray-500 hover:text-gray-700">
      <svg fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="0" class="w-6 h-6" viewBox="0 0 24 24">
        <path stroke="none" d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"></path>
        <circle cx="4" cy="4" r="2" stroke="none"></circle>
      </svg>
    </a>
  </div>

  <!-- Copyright and Unsubscribe -->
  <div class="mt-6 text-gray-500 text-sm">
    <p>&copy; Copyright 2018 EmailMonks All rights reserved.</p>
    <a href="#" class="underline hover:text-gray-700">Unsubscribe</a>
  </div>
</div>
</body>
</html>
