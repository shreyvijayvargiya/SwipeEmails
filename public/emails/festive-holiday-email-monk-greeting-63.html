<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festive Holiday Email Monk Greeting</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="bg-[#fcd34d] font-sans">
    <div class="bg-black py-2 text-white text-center">
        Happy Holidays! | <a href="#" class="text-white underline">View in Browser</a>
    </div>

    <div class="bg-[#fcd34d] py-8">
        <div class="text-center text-4xl font-bold text-black">Email Monks</div>
    </div>

    <div class="bg-[#fcd34d] py-8 px-4 sm:px-8 md:px-16 lg:px-24 xl:px-32">
        <div class="bg-[#fcd34d] rounded-lg shadow-lg">
            <div class="relative">
                <div class="bg-yellow-500 rounded-lg overflow-hidden">
                    <div class="relative">
                        <img src="PLACEHOLDER_IMAGE" alt="Greetings Image" class="w-full h-auto" style="max-width: 100%; height: auto;">
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <div class="text-3xl font-bold text-black text-center">
                                Season's Greetings from Email Monks
                            </div>
                           <div class="w-[150px] aspect-square">
                           <img src="PLACEHOLDER_MONK_IMAGE" alt="Monk Illustration" class="w-full h-auto mt-4">
                           </div>

                            <a href="#" class="bg-yellow-500 hover:bg-yellow-700 text-black font-bold py-2 px-4 rounded-full mt-8 inline-block">
                                Click here to Explore the Email
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-black text-white py-4 px-4 sm:px-8 md:px-16 lg:px-24 xl:px-32 flex items-center justify-between">

      <div class="text-white text-xl">Email Monks</div>

        <div>
            <a href="#" class="inline-block mx-1"><img src="PLACEHOLDER_FB_ICON" alt="Facebook" class="w-6 h-6"></a>
            <a href="#" class="inline-block mx-1"><img src="PLACEHOLDER_TWITTER_ICON" alt="Twitter" class="w-6 h-6"></a>
            <a href="#" class="inline-block mx-1"><img src="PLACEHOLDER_LINKEDIN_ICON" alt="LinkedIn" class="w-6 h-6"></a>
        </div>
    </div>

    <div class="bg-black text-gray-500 py-2 text-center text-sm">
        © Copyright 2018 EmailMonks. All rights reserved. | <a href="#" class="text-gray-500 underline">Unsubscribe</a>
    </div>
</div>
</body>
</html>
